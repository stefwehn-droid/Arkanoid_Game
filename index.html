<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Arkanoid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #111827, #020617 70%); overflow: hidden; font-family: Arial, sans-serif; color: white; }
        canvas { display: block; margin: auto; background: linear-gradient(to bottom, #080c18, #000); box-shadow: 0 0 40px rgba(0,255,255,0.2); }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        h1 { font-size: clamp(40px, 6vw, 80px); color: cyan; text-shadow: 0 0 15px cyan; margin-bottom: 10px; }
        button { margin: 10px; padding: 14px 28px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00e5ff, #6a5cff); color: white; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px cyan; }
        .info { margin-top: 20px; font-size: 14px; opacity: 0.8; }
        kbd { background: #1e293b; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="menu" class="overlay">
    <h1>NEON ARKANOID</h1>
    <h2>Retro Sci-Fi Edition</h2>
    <button onclick="startGame(1)">Einzelspieler</button>
    <button onclick="startGame(2)">Zweispieler</button>
    <button onclick="startDemoMode()">🤖 Demo Modus</button>
    <div class="info">
        <p>P1: <kbd>A</kbd> / <kbd>D</kbd> | P2: <kbd>←</kbd> / <kbd>→</kbd> | Pause: <kbd>P</kbd></p>
    </div>
</div>

<div id="pauseScreen" class="overlay hidden">
    <h1>PAUSE</h1>
    <button onclick="resumeGame()">Weiter</button>
    <button onclick="backToMenu()">Hauptmenü</button>
</div>

<div id="gameOver" class="overlay hidden">
    <h1>GAME OVER</h1>
    <h2 id="finalScoreDisplay"></h2>
    <button onclick="backToMenu()">Hauptmenü</button>
</div>

<div id="levelComplete" class="overlay hidden">
    <h1>LEVEL GESCHAFFT</h1>
    <button onclick="nextLevel()">Nächstes Level</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Game State
let gameRunning = false;
let paused = false;
let gameMode = 1;
let currentLevel = 0;
let score = 0;
let lives = 3;
let demoMode = false;

let player1, player2, bricks = [], balls = [], particles = [], powerUps = [], lasers = [];
let keys = {};

// Audio Setup
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, duration) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const brickColors = ['#ff4d6d','#ffb703','#00f5d4','#70e000','#9d4edd'];
const levels = [
    ["1111111111", "1111111111", "1111111111"],
    ["1010101010", "0101010101", "1010101010"],
    ["1111111111", "1000000001", "1111111111"]
];

class Paddle {
    constructor(x, y, controls, color, isAI = false) {
        this.x = x; this.y = y; this.width = 160; this.height = 18;
        this.speed = 10; this.controls = controls; this.color = color; this.ai = isAI;
    }
    update() {
        if (this.ai && balls.length > 0) {
            let target = balls[0].x - this.width / 2;
            this.x += (target - this.x) * 0.12;
        } else {
            if (keys[this.controls.left]) this.x -= this.speed;
            if (keys[this.controls.right]) this.x += this.speed;
        }
        this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
    }
}

class Ball {
    constructor(x, y) {
        this.x = x; this.y = y; this.radius = 10;
        this.dx = 5 * (Math.random() > 0.5 ? 1 : -1);
        this.dy = -5;
    }
    update() {
        this.x += this.dx; this.y += this.dy;
        if (this.x < 10 || this.x > canvas.width - 10) { this.dx *= -1; playBeep(400, 0.1); }
        if (this.y < 10) { this.dy *= -1; playBeep(500, 0.1); }

        [player1, player2].forEach((p, idx) => {
            if (idx === 1 && gameMode === 1 && !demoMode) return;
            if (this.y + this.radius > p.y && this.y < p.y + p.height && this.x > p.x && this.x < p.x + p.width) {
                this.dy = -Math.abs(this.dy);
                this.dx += (this.x - (p.x + p.width / 2)) / 10;
                playBeep(600, 0.1);
            }
        });

        bricks.forEach(b => {
            if (!b.destroyed && this.x > b.x && this.x < b.x + b.width && this.y > b.y && this.y < b.y + b.height) {
                b.destroyed = true;
                this.dy *= -1;
                score += 100;
                playBeep(800, 0.05);
            }
        });

        if (this.y > canvas.height) {
            balls = balls.filter(b => b !== this);
            if (balls.length === 0) {
                lives--;
                if (lives <= 0) endGame();
                else resetBalls();
            }
        }
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "cyan";
        ctx.fill();
    }
}

class Brick {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.width = 80; this.height = 25;
        this.color = color; this.destroyed = false;
    }
    draw() {
        if (this.destroyed) return;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width - 4, this.height - 4);
    }
}

function createBricks(lvl) {
    bricks = [];
    const pattern = levels[lvl % levels.length];
    const offsetX = (canvas.width - (pattern[0].length * 80)) / 2;
    pattern.forEach((row, r) => {
        row.split('').forEach((cell, c) => {
            if (cell === '1') bricks.push(new Brick(offsetX + c * 80, 80 + r * 30, brickColors[r % brickColors.length]));
        });
    });
}

function startGame(mode) {
    initAudio();
    gameMode = mode;
    demoMode = false;
    currentLevel = 0;
    score = 0;
    lives = 3;
    initLevel();
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('gameOver').classList.add('hidden');
    gameRunning = true;
}

function startDemoMode() {
    startGame(1);
    demoMode = true;
    player1.ai = true;
}

function initLevel() {
    player1 = new Paddle(canvas.width / 2 - 80, canvas.height - 50, { left: 'a', right: 'd' }, 'cyan');
    player2 = new Paddle(canvas.width / 2 - 80, canvas.height - 80, { left: 'ArrowLeft', right: 'ArrowRight' }, 'magenta');
    createBricks(currentLevel);
    resetBalls();
}

function resetBalls() {
    balls = [new Ball(canvas.width / 2, canvas.height - 100)];
}

function nextLevel() {
    currentLevel++;
    initLevel();
    document.getElementById('levelComplete').classList.add('hidden');
    gameRunning = true;
}

function endGame() {
    gameRunning = false;
    document.getElementById('finalScoreDisplay').innerText = "Score: " + score;
    document.getElementById('gameOver').classList.remove('hidden');
}

function backToMenu() {
    location.reload();
}

function resumeGame() {
    paused = false;
    document.getElementById('pauseScreen').classList.add('hidden');
}

window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p') {
        paused = !paused;
        document.getElementById('pauseScreen').classList.toggle('hidden', !paused);
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function update() {
    if (!gameRunning || paused) {
        requestAnimationFrame(update);
        return;
    }

    player1.update();
    if (gameMode === 2) player2.update();
    balls.forEach(b => b.update());

    if (bricks.every(b => b.destroyed)) {
        gameRunning = false;
        if (demoMode) setTimeout(nextLevel, 1000);
        else document.getElementById('levelComplete').classList.remove('hidden');
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    bricks.forEach(b => b.draw());
    player1.draw();
    if (gameMode === 2) player2.draw();
    balls.forEach(b => b.draw());

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(`Score: ${score} | Leben: ${lives} | Level: ${currentLevel + 1}`, 20, 40);
    if (demoMode) ctx.fillText("🤖 DEMO MODUS", canvas.width - 180, 40);
}

// Start Loop
update();
</script>
</body>
</html>
